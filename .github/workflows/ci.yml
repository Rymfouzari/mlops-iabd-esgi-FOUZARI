name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev --python 3.13

      - name: Lint
        run: PYTHONPATH=todo uv run ruff check todo/mlproject tests

      - name: Type check
        run: PYTHONPATH=todo uv run mypy todo/mlproject

      - name: Tests
        run: PYTHONPATH=todo uv run pytest