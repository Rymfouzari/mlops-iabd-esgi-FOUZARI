name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualite (lint + types + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv avec cache
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances
        run: uv sync --extra dev

      - name: Lint
        run: PYTHONPATH=todo uv run ruff check todo/mlproject tests todo/scripts

      - name: Types
        run: PYTHONPATH=todo uv run mypy todo/mlproject

      - name: Tests
        run: PYTHONPATH=todo uv run pytest

  train:
    name: Entrainement (Continuous Training)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Installation de uv avec cache
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Installation des dependances
        run: uv sync

      - name: Entrainement de la baseline
        env:
        MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: PYTHONPATH=todo uv run python -m mlproject.train

      - name: Publication du modele en artefact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib